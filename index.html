<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymLog — Mi Rutina</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:600;color:#fff}
.date-label{font-size:12px;color:#888;margin-top:2px}
.tab-bar{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:9px 18px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;margin-bottom:1rem}
select{font-size:13px;padding:8px 12px;border:1px solid #333;border-radius:8px;background:#222;color:#e8e8e8}
select:focus{outline:none;border-color:#1D9E75}
.btn{padding:7px 14px;font-size:12px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e8e8e8;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#2a2a2a}
.btn-green{background:#1D9E75;color:#fff;border-color:#0F6E56}.btn-green:hover{background:#0F6E56}
.btn-red{background:#3d1a1a;color:#f08080;border-color:#5a2a2a}.btn-red:hover{background:#4d2020}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{border:none;background:none;color:#666;padding:2px 6px;cursor:pointer;font-size:13px}.btn-ghost:hover{color:#E24B4A}
.no-content{text-align:center;padding:3rem 1rem;color:#555;font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:600;color:#fff}
.stat-lbl{font-size:11px;color:#666;margin-top:3px}

/* Ejercicio colapsable */
.ex-block{border:1px solid #2a2a2a;border-radius:12px;margin-bottom:10px;overflow:hidden;background:#1a1a1a}
.ex-header{padding:12px 14px;background:#222;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px;flex-wrap:wrap}
.ex-header:hover{background:#282828}
.ex-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.ex-chevron{font-size:12px;color:#666;transition:transform .2s;flex-shrink:0}
.ex-chevron.open{transform:rotate(90deg)}
.ex-nombre{font-size:13px;font-weight:500;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:11px;color:#666;white-space:nowrap}
.ex-body{display:none;border-top:1px solid #2a2a2a}
.ex-body.open{display:block}
.ex-actions{padding:8px 14px;background:#1e1e1e;border-bottom:1px solid #2a2a2a;display:flex;gap:8px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.series-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.series-table th{padding:7px 8px;text-align:left;font-size:11px;color:#666;font-weight:500;background:#1e1e1e;border-bottom:1px solid #2a2a2a}
.series-table td{padding:6px 8px;border-bottom:1px solid #1e1e1e;vertical-align:top;color:#e8e8e8}
.series-table tr:last-child td{border-bottom:none}
.series-table tr:hover td{background:#1e1e1e}
.series-table input[type=number]{width:58px;padding:5px 4px;font-size:12px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;text-align:center}
.series-table input[type=number]:focus{outline:none;border-color:#1D9E75}
.series-table textarea{width:100%;padding:5px 6px;font-size:11px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;resize:none;height:34px}
.series-table textarea:focus{outline:none;border-color:#1D9E75}
.tipo-select{font-size:11px;padding:4px 6px;border-radius:20px;cursor:pointer;font-weight:500;border:1px solid}
.tipo-warmup{background:#0c2a3d;color:#5bb3e8;border-color:#1a4a6a}
.tipo-top{background:#0d2b1a;color:#4cba7a;border-color:#1a4a28}
.tipo-backoff{background:#2b1f08;color:#d4943a;border-color:#4a3010}
.tipo-normal{background:#222;color:#aaa;border-color:#333}
.tipo-fallo{background:#2b0d1a;color:#d45c8a;border-color:#4a1530}
.drop-zone{padding:4px 0 2px}
.drop-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding:5px 8px;background:#111;border-radius:7px;border:1px solid #2a2a2a}
.drop-label{font-size:10px;font-weight:600;color:#d45c8a;white-space:nowrap;min-width:42px}
.drop-sep{font-size:11px;color:#555}
.drop-item input[type=number]{width:50px;font-size:11px;padding:3px 4px;border:1px solid #333;border-radius:5px;background:#1a1a1a;color:#e8e8e8;text-align:center}
.add-drop-btn{font-size:11px;padding:3px 8px;color:#d45c8a;border-color:#4a1530;background:#2b0d1a}.add-drop-btn:hover{background:#3a1020}
.add-warmup-btn{font-size:11px;padding:3px 8px;color:#5bb3e8;border-color:#1a4a6a;background:#0c2a3d}.add-warmup-btn:hover{background:#0f3550}

/* Calendario */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;color:#666;padding:4px 0;font-weight:500}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid transparent;color:#888;background:#1a1a1a;flex-direction:column;gap:2px}
.cal-day:hover{border-color:#333;color:#e8e8e8}
.cal-day.has-session{background:#0d2b1a;border-color:#1a4a28;color:#4cba7a}
.cal-day.today{border-color:#1D9E75;color:#1D9E75;font-weight:600}
.cal-day.selected{background:#1D9E75;color:#fff;border-color:#1D9E75}
.cal-day.empty{cursor:default;background:transparent;border:none}
.cal-dot{width:5px;height:5px;border-radius:50%;background:#4cba7a}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav-title{font-size:15px;font-weight:500;color:#e8e8e8}
.session-list{display:flex;flex-direction:column;gap:8px}
.session-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.session-date-title{font-size:13px;font-weight:500;color:#e8e8e8}
.session-sub{font-size:11px;color:#666;margin-top:2px}
.session-actions{display:flex;gap:6px}

/* Modal con scroll interno */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:flex-start;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:14px;width:100%;max-width:640px;margin:auto;display:flex;flex-direction:column;max-height:90vh}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:500;color:#e8e8e8}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.25rem;flex:1}
.modal-footer{padding:.75rem 1.25rem;border-top:1px solid #2a2a2a;display:flex;justify-content:flex-end;flex-shrink:0}

/* Ejercicio colapsable en modal */
.modal-ex{border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.modal-ex-header{padding:10px 12px;background:#222;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.modal-ex-header:hover{background:#282828}
.modal-ex-body{display:none;overflow-x:auto}
.modal-ex-body.open{display:block}

.saving-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;font-size:15px;color:#fff;gap:12px}
.saving-overlay.show{display:flex}
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;display:none;z-index:999}
.toast-ok{background:#1D9E75;color:#fff}
.toast-err{background:#8b2020;color:#fff}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <div class="logo">🏋️ GymLog</div>
      <div class="date-label" id="todayLabel"></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('log',this)">📅 Log del día</button>
    <button class="tab" onclick="switchTab('historial',this)">📂 Historial</button>
    <button class="tab" onclick="switchTab('plan',this)">📋 Plan</button>
  </div>

  <div id="sec-log" class="section active">
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <label style="font-size:13px;font-weight:500;white-space:nowrap">Día de hoy:</label>
        <select id="routineSelect" style="flex:1;min-width:180px">
          <option value="">— Selecciona el día —</option>
        </select>
        <button class="btn btn-green" onclick="guardarSesion()">💾 Guardar sesión</button>
      </div>
    </div>
    <div id="logContent"><div class="no-content">⬆️ Selecciona el día para comenzar</div></div>
  </div>

  <div id="sec-historial" class="section">
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-sm" onclick="cambiarMes(-1)">← Anterior</button>
        <span class="cal-nav-title" id="calTitle"></span>
        <button class="btn btn-sm" onclick="cambiarMes(1)">Siguiente →</button>
      </div>
      <div class="cal-header">
        <div class="cal-day-name">Dom</div><div class="cal-day-name">Lun</div>
        <div class="cal-day-name">Mar</div><div class="cal-day-name">Mié</div>
        <div class="cal-day-name">Jue</div><div class="cal-day-name">Vie</div>
        <div class="cal-day-name">Sáb</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="sessionDetail"><div class="no-content" style="padding:1rem">Selecciona un día del calendario</div></div>
  </div>

  <div id="sec-plan" class="section"><div id="planContent"></div></div>
</div>

<!-- MODAL VER SESIÓN -->
<div class="modal-bg" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">👁 Detalle de sesión</h3>
      <button class="btn-ghost" onclick="cerrarModal()" style="font-size:18px">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay"><div class="spinner"></div> Guardando...</div>
<div class="toast toast-ok" id="toastOk"></div>
<div class="toast toast-err" id="toastErr"></div>

<script>
const SUPABASE_URL='https://jkdpgdpvsxhysrcoqnxv.supabase.co';
const SUPABASE_KEY='sb_publishable_7H4N30FrzliMlDPuk8ulLA_XVWtdFlm';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS_ES=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const now=new Date();
document.getElementById('todayLabel').textContent=DAYS_ES[now.getDay()]+', '+now.getDate()+' de '+MONTHS[now.getMonth()]+' '+now.getFullYear();

const TIPO_OPTS=['warmup','normal','top','backoff','fallo'];
const TIPO_LABELS={warmup:'Calentamiento',normal:'Serie',top:'Top set',backoff:'Back off',fallo:'Fallo'};
const TIPO_CLS={warmup:'tipo-warmup',normal:'tipo-normal',top:'tipo-top',backoff:'tipo-backoff',fallo:'tipo-fallo'};
const tipoClsMap=TIPO_CLS;

const RUTINA=[
  {id:1,nombre:'Día 1 — Glúteo y Cuádriceps',ejercicios:[
    {id:11,nombre:'Hip thrust en máquina',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:12,nombre:'Aductores',repsRef:'8 mín',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:13,nombre:'Sentadilla Smith',repsRef:'8-10',series:[{tipo:'warmup'},{tipo:'warmup'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:14,nombre:'Abducción inclinación 30°',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:15,nombre:'Extensión de cuádriceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:16,nombre:'Sentadilla búlgara',repsRef:'Fallo',series:[{tipo:'fallo'},{tipo:'fallo'}]},
  ]},
  {id:2,nombre:'Día 2 — Pecho / Hombro / Tríceps',ejercicios:[
    {id:21,nombre:'Press inclinado mancuernas',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:22,nombre:'Peck deck',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:23,nombre:'Press militar',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:24,nombre:'Elevaciones laterales',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:25,nombre:'Extensión de tríceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:26,nombre:'Copa para tríceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:3,nombre:'Día 3 — Cuádriceps e Isquiotibiales',ejercicios:[
    {id:31,nombre:'Curl tumbado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:32,nombre:'Aductores',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:33,nombre:'Prensa',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:34,nombre:'Extensión de cuádriceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:35,nombre:'Curl sentado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:4,nombre:'Día 4 — Espalda / Bíceps',ejercicios:[
    {id:41,nombre:'Jalón al pecho',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:42,nombre:'Remo Gironda',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:43,nombre:'Jalón agarre supino',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:44,nombre:'Remo alto',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:45,nombre:'Curl de bíceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:5,nombre:'Día 5 — Glúteo e Isquiotibiales',ejercicios:[
    {id:51,nombre:'Curl sentado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:52,nombre:'Hip thrust en máquina',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:53,nombre:'Aductores',repsRef:'8 mín',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:54,nombre:'Abducción inclinación 30°',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:55,nombre:'Peso muerto rumano',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:56,nombre:'Curl martillo',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
];

let calYear=now.getFullYear(),calMonth=now.getMonth(),sesionesDelMes=[];

function populateSelect(){
  const sel=document.getElementById('routineSelect');
  RUTINA.forEach(r=>{sel.innerHTML+=`<option value="${r.id}">${r.nombre}</option>`;});
  sel.onchange=()=>initLog();
}

function initLog(){
  const id=parseInt(document.getElementById('routineSelect').value);
  if(!id){document.getElementById('logContent').innerHTML='<div class="no-content">⬆️ Selecciona el día para comenzar</div>';return;}
  renderLog(RUTINA.find(x=>x.id===id));
}

function renderLog(r){
  const totalSeries=r.ejercicios.reduce((a,e)=>a+e.series.length,0);
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${r.ejercicios.length}</div><div class="stat-lbl">Ejercicios</div></div>
    <div class="stat-card"><div class="stat-val">${totalSeries}</div><div class="stat-lbl">Series</div></div>
    <div class="stat-card"><div class="stat-val" id="volTotal">0</div><div class="stat-lbl">Volumen kg</div></div>
  </div>`;
  r.ejercicios.forEach((ex,ei)=>{
    const openClass=ei===0?' open':'';
    html+=`<div class="ex-block">
      <div class="ex-header" onclick="toggleEx(this)">
        <div class="ex-header-left">
          <span class="ex-chevron${openClass}">▶</span>
          <span class="ex-nombre">${ex.nombre}</span>
          <span class="ex-meta">${ex.series.length} series · ${ex.repsRef}</span>
        </div>
        <button class="btn add-warmup-btn btn-sm" onclick="event.stopPropagation();addWarmup(${ex.id})">+ calentamiento</button>
      </div>
      <div class="ex-body${openClass}">
        <div class="table-wrap"><table class="series-table">
          <thead><tr>
            <th style="width:28px">#</th>
            <th style="width:128px">Tipo</th>
            <th style="width:64px">Peso kg</th>
            <th style="width:56px">Reps</th>
            <th>Drop sets</th>
            <th style="width:110px">Comentario</th>
          </tr></thead>
          <tbody id="ex_${ex.id}">`;
    ex.series.forEach((s,si)=>{html+=serieRowHTML(ex.id,si,s.tipo);});
    html+=`</tbody></table></div></div></div>`;
  });
  document.getElementById('logContent').innerHTML=html;
}

function toggleEx(header){
  const chev=header.querySelector('.ex-chevron');
  const body=header.nextElementSibling;
  chev.classList.toggle('open');
  body.classList.toggle('open');
}

function serieRowHTML(exId,si,tipo){
  return `<tr id="row_${exId}_${si}">
    <td style="text-align:center;color:#555;font-size:11px">${si+1}</td>
    <td><select class="tipo-select ${TIPO_CLS[tipo]}" onchange="this.className='tipo-select '+tipoClsMap[this.value];calcVolume()">
      ${TIPO_OPTS.map(t=>`<option value="${t}"${t===tipo?' selected':''}>${TIPO_LABELS[t]}</option>`).join('')}
    </select></td>
    <td><input type="number" placeholder="—" min="0" step="0.5" oninput="calcVolume()"></td>
    <td><input type="number" placeholder="—" min="0" oninput="calcVolume()"></td>
    <td>
      <div class="drop-zone" id="dzone_${exId}_${si}"></div>
      <button class="btn add-drop-btn btn-sm" onclick="addDrop('${exId}','${si}')">+ drop</button>
    </td>
    <td><textarea placeholder="notas..."></textarea></td>
  </tr>`;
}

function addWarmup(exId){
  const tbody=document.getElementById('ex_'+exId);
  // open the block first
  const block=tbody.closest('.ex-block');
  block.querySelector('.ex-body').classList.add('open');
  block.querySelector('.ex-chevron').classList.add('open');
  const rows=[...tbody.querySelectorAll('tr')];
  const newSi='w'+Date.now();
  const tr=document.createElement('tr');
  tr.id='row_'+exId+'_'+newSi;
  tr.innerHTML=serieRowHTML(exId,newSi,'warmup').replace(`<tr id="row_${exId}_${newSi}">`,``);
  let inserted=false;
  for(let row of rows){
    const sel=row.querySelector('.tipo-select');
    if(sel&&sel.value!=='warmup'){tbody.insertBefore(tr,row);inserted=true;break;}
  }
  if(!inserted)tbody.insertBefore(tr,rows[0]||null);
  renumberRows(tbody);
}

function renumberRows(tbody){
  [...tbody.querySelectorAll('tr')].forEach((r,i)=>{
    const cell=r.querySelector('td');
    if(cell)cell.textContent=i+1;
  });
}

function dropHTML(exId,si,di){
  return `<div class="drop-item" id="drop_${exId}_${si}_${di}">
    <span class="drop-label">Drop ${di+1}</span>
    <input type="number" placeholder="kg" min="0" step="0.5" oninput="calcVolume()">
    <span class="drop-sep">×</span>
    <input type="number" placeholder="reps" min="0" oninput="calcVolume()">
    <button class="btn-ghost" onclick="this.closest('.drop-item').remove();renumDrops('${exId}','${si}')">✕</button>
  </div>`;
}

function addDrop(exId,si){
  const zone=document.getElementById('dzone_'+exId+'_'+si);
  const di=zone.querySelectorAll('.drop-item').length;
  const el=document.createElement('div');
  el.innerHTML=dropHTML(exId,si,di);
  zone.appendChild(el.firstElementChild);
}

function renumDrops(exId,si){
  const zone=document.getElementById('dzone_'+exId+'_'+si);
  if(zone)zone.querySelectorAll('.drop-label').forEach((l,i)=>l.textContent='Drop '+(i+1));
  calcVolume();
}

function calcVolume(){
  let vol=0;
  document.querySelectorAll('#logContent tbody tr').forEach(row=>{
    const ins=row.querySelectorAll('td > input[type=number]');
    const p=parseFloat(ins[0]?.value)||0,r=parseInt(ins[1]?.value)||0;
    if(p&&r)vol+=p*r;
    row.querySelectorAll('.drop-item').forEach(d=>{
      const di=d.querySelectorAll('input[type=number]');
      const dp=parseFloat(di[0]?.value)||0,dr=parseInt(di[1]?.value)||0;
      if(dp&&dr)vol+=dp*dr;
    });
  });
  const el=document.getElementById('volTotal');
  if(el)el.textContent=Math.round(vol);
}

async function guardarSesion(){
  const diaId=parseInt(document.getElementById('routineSelect').value);
  if(!diaId){showToast('Selecciona un día primero','err');return;}
  const r=RUTINA.find(x=>x.id===diaId);
  const fecha=now.toISOString().slice(0,10);
  const series=[];
  r.ejercicios.forEach(ex=>{
    const tbody=document.getElementById('ex_'+ex.id);
    if(!tbody)return;
    [...tbody.querySelectorAll('tr')].forEach((row,si)=>{
      const sel=row.querySelector('.tipo-select');
      const ins=row.querySelectorAll('td > input[type=number]');
      const ta=row.querySelector('textarea');
      const tipo=sel?sel.value:'normal';
      const peso=parseFloat(ins[0]?.value)||null;
      const reps=parseInt(ins[1]?.value)||null;
      const comentario=ta?ta.value.trim():'';
      const drops=[];
      row.querySelectorAll('.drop-item').forEach((d,di)=>{
        const dins=d.querySelectorAll('input[type=number]');
        drops.push({drop_index:di,peso:parseFloat(dins[0]?.value)||null,reps:parseInt(dins[1]?.value)||null});
      });
      series.push({ejercicio_id:ex.id,ejercicio_nombre:ex.nombre,serie_index:si,tipo,peso,reps,comentario,es_calentamiento:tipo==='warmup',drops});
    });
  });
  document.getElementById('savingOverlay').classList.add('show');
  try{
    const{data:sesData,error:sesErr}=await sb.from('sesiones').insert({fecha,dia_id:diaId,dia_nombre:r.nombre}).select().single();
    if(sesErr)throw sesErr;
    const sesId=sesData.id;
    for(const s of series){
      const{data:sData,error:sErr}=await sb.from('series_log').insert({
        sesion_id:sesId,ejercicio_id:s.ejercicio_id,ejercicio_nombre:s.ejercicio_nombre,
        serie_index:s.serie_index,tipo:s.tipo,peso:s.peso,reps:s.reps,
        comentario:s.comentario,es_calentamiento:s.es_calentamiento
      }).select().single();
      if(sErr)throw sErr;
      if(s.drops.length)await sb.from('drop_sets').insert(s.drops.map(d=>({...d,serie_id:sData.id})));
    }
    document.getElementById('routineSelect').value='';
    document.getElementById('logContent').innerHTML='<div class="no-content">✅ Sesión guardada. Selecciona el próximo día cuando quieras.</div>';
    sesionesDelMes=[];
    showToast('✓ Sesión guardada','ok');
  }catch(e){
    console.error(e);
    showToast('Error: '+e.message,'err');
  }finally{
    document.getElementById('savingOverlay').classList.remove('show');
  }
}

// ── HISTORIAL ──
async function cargarSesionesDelMes(){
  const y=calYear,m=calMonth;
  const desde=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const hasta=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const{data,error}=await sb.from('sesiones').select('id,fecha,dia_nombre').gte('fecha',desde).lte('fecha',hasta).order('fecha');
  if(!error)sesionesDelMes=data||[];
}

async function renderCalendar(){
  document.getElementById('calTitle').textContent=MONTHS[calMonth].charAt(0).toUpperCase()+MONTHS[calMonth].slice(1)+' '+calYear;
  await cargarSesionesDelMes();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  const sesMap={};
  sesionesDelMes.forEach(s=>{if(!sesMap[s.fecha])sesMap[s.fecha]=[];sesMap[s.fecha].push(s);});
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='cal-day'+(sesMap[ds]?' has-session':'')+(ds===todayStr?' today':'');
    html+=`<div class="${cls}" onclick="selectDay('${ds}')">${d}${sesMap[ds]?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

async function selectDay(dateStr){
  document.querySelectorAll('.cal-day:not(.empty)').forEach(d=>d.classList.remove('selected'));
  const day=parseInt(dateStr.split('-')[2]);
  const el=document.querySelectorAll('.cal-grid .cal-day:not(.empty)')[day-1];
  if(el)el.classList.add('selected');
  const{data,error}=await sb.from('sesiones').select('*').eq('fecha',dateStr).order('creado_at');
  const detail=document.getElementById('sessionDetail');
  if(error||!data||!data.length){detail.innerHTML=`<div class="no-content" style="padding:1rem">Sin sesiones el ${dateStr}</div>`;return;}
  let html=`<div style="font-size:12px;color:#888;margin-bottom:8px">${dateStr}</div><div class="session-list">`;
  data.forEach(s=>{
    html+=`<div class="session-item">
      <div>
        <div class="session-date-title">${s.dia_nombre}</div>
        <div class="session-sub">${new Date(s.creado_at).toLocaleString('es')}</div>
      </div>
      <div class="session-actions">
        <button class="btn btn-sm" onclick="verSesion('${s.id}','${s.dia_nombre}')">👁 Ver</button>
        <button class="btn btn-sm btn-red" onclick="eliminarSesion('${s.id}','${dateStr}')">🗑</button>
      </div>
    </div>`;
  });
  detail.innerHTML=html+'</div>';
}

async function verSesion(sesId,titulo){
  const{data:series}=await sb.from('series_log').select('*,drop_sets(*)').eq('sesion_id',sesId).order('ejercicio_id').order('serie_index');
  if(!series||!series.length){showToast('Sin datos','err');return;}
  const grupos={};
  series.forEach(s=>{if(!grupos[s.ejercicio_nombre])grupos[s.ejercicio_nombre]=[];grupos[s.ejercicio_nombre].push(s);});
  document.getElementById('modalTitle').textContent='👁 '+titulo;
  let html='';
  Object.entries(grupos).forEach(([nombre,srs],gi)=>{
    const openClass=gi===0?' open':'';
    html+=`<div class="modal-ex">
      <div class="modal-ex-header" onclick="toggleModalEx(this)">
        <span style="font-size:11px;color:#666;margin-right:4px;transition:transform .2s${openClass?';transform:rotate(90deg)':''}">▶</span>
        <span style="font-size:13px;font-weight:500;color:#e8e8e8;flex:1">${nombre}</span>
        <span style="font-size:11px;color:#666">${srs.length} series</span>
      </div>
      <div class="modal-ex-body${openClass}">
        <table class="series-table"><thead><tr>
          <th style="width:28px">#</th><th style="width:110px">Tipo</th>
          <th style="width:64px">Peso kg</th><th style="width:56px">Reps</th>
          <th>Drops</th><th>Comentario</th>
        </tr></thead><tbody>`;
    srs.forEach((s,i)=>{
      const drops=(s.drop_sets||[]).map((d,di)=>`<span style="font-size:10px;color:#d45c8a;background:#2b0d1a;padding:2px 6px;border-radius:4px;margin-right:3px;white-space:nowrap;display:inline-block;margin-bottom:2px">Drop ${di+1}: ${d.peso||'—'}kg×${d.reps||'—'}</span>`).join('');
      html+=`<tr>
        <td style="text-align:center;color:#555;font-size:11px">${i+1}</td>
        <td><span class="tipo-select ${TIPO_CLS[s.tipo]||'tipo-normal'}" style="cursor:default;display:inline-block">${TIPO_LABELS[s.tipo]||s.tipo}</span></td>
        <td style="text-align:center">${s.peso||'—'}</td>
        <td style="text-align:center">${s.reps||'—'}</td>
        <td>${drops||'—'}</td>
        <td style="color:#666;font-size:11px">${s.comentario||''}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('viewModal').classList.add('open');
}

function toggleModalEx(header){
  const chev=header.querySelector('span');
  const body=header.nextElementSibling;
  const isOpen=body.classList.toggle('open');
  chev.style.transform=isOpen?'rotate(90deg)':'rotate(0deg)';
}

async function eliminarSesion(sesId,dateStr){
  if(!confirm('¿Eliminar esta sesión?'))return;
  const{error}=await sb.from('sesiones').delete().eq('id',sesId);
  if(error){showToast('Error al eliminar','err');return;}
  showToast('Sesión eliminada','ok');
  sesionesDelMes=[];
  await renderCalendar();
  selectDay(dateStr);
}

function cerrarModal(){document.getElementById('viewModal').classList.remove('open');}
document.getElementById('viewModal').onclick=function(e){if(e.target===this)cerrarModal();};

function cambiarMes(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  sesionesDelMes=[];renderCalendar();
  document.getElementById('sessionDetail').innerHTML=`<div class="no-content" style="padding:1rem">Selecciona un día del calendario</div>`;
}

function renderPlan(){
  let html='';
  RUTINA.forEach(r=>{
    html+=`<div style="border:1px solid #2a2a2a;border-radius:12px;margin-bottom:12px;overflow:hidden">
      <div style="padding:10px 14px;background:#222;font-size:13px;font-weight:500;color:#e8e8e8;border-bottom:1px solid #2a2a2a">
        📅 ${r.nombre} <span style="font-size:11px;font-weight:400;color:#666">${r.ejercicios.length} ejercicios</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="padding:6px 14px;text-align:left;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222">Ejercicio</th>
          <th style="padding:6px 14px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:60px">Series</th>
          <th style="padding:6px 14px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:80px">Reps</th>
        </tr></thead><tbody>`;
    r.ejercicios.forEach((ex,i)=>{
      html+=`<tr style="${i<r.ejercicios.length-1?'border-bottom:1px solid #1e1e1e':''}">
        <td style="padding:8px 14px;color:#ccc">${ex.nombre}</td>
        <td style="padding:8px 14px;text-align:center;color:#666">${ex.series.length}</td>
        <td style="padding:8px 14px;text-align:center;color:#666">${ex.repsRef}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('planContent').innerHTML=html;
}

function showToast(msg,type){
  const el=document.getElementById(type==='ok'?'toastOk':'toastErr');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},2500);
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='historial')renderCalendar();
  if(t==='plan')renderPlan();
}

populateSelect();
