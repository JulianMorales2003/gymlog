<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymLog — Mi Rutina</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8;min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:600;color:#fff}
.date-label{font-size:12px;color:#888;margin-top:2px}
.tab-bar{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:1.5rem}
.tab{padding:9px 18px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.tab:hover{color:#ccc}
.section{display:none}.section.active{display:block}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;margin-bottom:1rem}
select,input[type=text],input[type=date]{font-size:13px;padding:8px 12px;border:1px solid #333;border-radius:8px;background:#222;color:#e8e8e8;cursor:pointer}
select:focus,input:focus{outline:none;border-color:#1D9E75}
.btn{padding:7px 14px;font-size:12px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e8e8e8;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn:hover{background:#2a2a2a}
.btn-green{background:#1D9E75;color:#fff;border-color:#0F6E56}.btn-green:hover{background:#0F6E56}
.btn-red{background:#3d1a1a;color:#f08080;border-color:#5a2a2a}.btn-red:hover{background:#4d2020}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{border:none;background:none;color:#666;padding:2px 6px;cursor:pointer;font-size:13px}.btn-ghost:hover{color:#E24B4A}
.no-content{text-align:center;padding:3rem 1rem;color:#555;font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:600;color:#fff}
.stat-lbl{font-size:11px;color:#666;margin-top:3px}
.ex-block{border:1px solid #2a2a2a;border-radius:12px;margin-bottom:12px;overflow:hidden;background:#1a1a1a}
.ex-title{padding:10px 14px;background:#222;font-size:13px;font-weight:500;color:#e8e8e8;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a}
.ex-title-left{display:flex;align-items:center;gap:8px}
.ex-meta{font-size:11px;font-weight:400;color:#666}
.series-table{width:100%;border-collapse:collapse;font-size:12px}
.series-table th{padding:7px 10px;text-align:left;font-size:11px;color:#666;font-weight:500;background:#1e1e1e;border-bottom:1px solid #2a2a2a}
.series-table td{padding:7px 10px;border-bottom:1px solid #1e1e1e;vertical-align:top;color:#e8e8e8}
.series-table tr:last-child td{border-bottom:none}
.series-table tr:hover td{background:#1e1e1e}
.series-table input[type=number]{width:62px;padding:5px 6px;font-size:12px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;text-align:center}
.series-table input[type=number]:focus{outline:none;border-color:#1D9E75}
.series-table textarea{width:100%;padding:5px 6px;font-size:11px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;resize:none;height:34px}
.series-table textarea:focus{outline:none;border-color:#1D9E75}
.tipo-select{font-size:11px;padding:4px 8px;border-radius:20px;cursor:pointer;font-weight:500;border:1px solid}
.tipo-warmup{background:#0c2a3d;color:#5bb3e8;border-color:#1a4a6a}
.tipo-top{background:#0d2b1a;color:#4cba7a;border-color:#1a4a28}
.tipo-backoff{background:#2b1f08;color:#d4943a;border-color:#4a3010}
.tipo-normal{background:#222;color:#aaa;border-color:#333}
.tipo-fallo{background:#2b0d1a;color:#d45c8a;border-color:#4a1530}
.drop-zone{padding:4px 0 2px}
.drop-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:6px 10px;background:#111;border-radius:7px;border:1px solid #2a2a2a}
.drop-label{font-size:10px;font-weight:600;color:#d45c8a;white-space:nowrap;min-width:46px}
.drop-sep{font-size:11px;color:#555}
.drop-item input[type=number]{width:56px;font-size:11px;padding:4px 5px;border:1px solid #333;border-radius:5px;background:#1a1a1a;color:#e8e8e8;text-align:center}
.add-drop-btn{font-size:11px;padding:3px 9px;color:#d45c8a;border-color:#4a1530;background:#2b0d1a}.add-drop-btn:hover{background:#3a1020}
.add-warmup-btn{font-size:11px;padding:3px 9px;color:#5bb3e8;border-color:#1a4a6a;background:#0c2a3d}.add-warmup-btn:hover{background:#0f3550}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;color:#666;padding:4px 0;font-weight:500}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid transparent;color:#888;background:#1a1a1a;transition:all .15s;flex-direction:column;gap:2px}
.cal-day:hover{border-color:#333;color:#e8e8e8}
.cal-day.has-session{background:#0d2b1a;border-color:#1a4a28;color:#4cba7a}
.cal-day.today{border-color:#1D9E75;color:#1D9E75;font-weight:600}
.cal-day.today.has-session{background:#0d2b1a}
.cal-day.selected{background:#1D9E75;color:#fff;border-color:#1D9E75}
.cal-day.empty{cursor:default;background:transparent;border:none}
.cal-dot{width:5px;height:5px;border-radius:50%;background:#4cba7a}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav-title{font-size:15px;font-weight:500;color:#e8e8e8}
.session-list{display:flex;flex-direction:column;gap:8px}
.session-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.session-item:hover{border-color:#333}
.session-info{flex:1}
.session-date{font-size:13px;font-weight:500;color:#e8e8e8}
.session-sub{font-size:11px;color:#666;margin-top:2px}
.session-actions{display:flex;gap:6px}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;display:none;z-index:999;transition:opacity .3s}
.toast-ok{background:#1D9E75;color:#fff}
.toast-err{background:#8b2020;color:#fff}
.loading{text-align:center;padding:2rem;color:#555}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:-4px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:1.5rem;width:90%;max-width:480px}
.modal h3{font-size:15px;font-weight:500;color:#e8e8e8;margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <div class="logo">🏋️ GymLog</div>
      <div class="date-label" id="todayLabel"></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('log',this)">📅 Log del día</button>
    <button class="tab" onclick="switchTab('historial',this)">📂 Historial</button>
    <button class="tab" onclick="switchTab('plan',this)">📋 Plan</button>
  </div>

  <!-- LOG DEL DÍA -->
  <div id="sec-log" class="section active">
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <label style="font-size:13px;font-weight:500;white-space:nowrap">Día de hoy:</label>
        <select id="routineSelect" style="flex:1;min-width:200px">
          <option value="">— Selecciona el día —</option>
        </select>
        <button class="btn btn-green" onclick="guardarSesion()">💾 Guardar sesión</button>
      </div>
    </div>
    <div id="logContent"><div class="no-content">⬆️ Selecciona el día para comenzar</div></div>
  </div>

  <!-- HISTORIAL -->
  <div id="sec-historial" class="section">
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-sm" onclick="cambiarMes(-1)">← Anterior</button>
        <span class="cal-nav-title" id="calTitle"></span>
        <button class="btn btn-sm" onclick="cambiarMes(1)">Siguiente →</button>
      </div>
      <div class="cal-header">
        <div class="cal-day-name">Dom</div><div class="cal-day-name">Lun</div>
        <div class="cal-day-name">Mar</div><div class="cal-day-name">Mié</div>
        <div class="cal-day-name">Jue</div><div class="cal-day-name">Vie</div>
        <div class="cal-day-name">Sáb</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="sessionDetail"><div class="no-content" style="padding:1rem">Selecciona un día del calendario</div></div>
  </div>

  <!-- PLAN -->
  <div id="sec-plan" class="section">
    <div id="planContent"></div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>✏️ Editar sesión</h3>
    <div id="editModalContent"></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-green" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast toast-ok" id="toastOk"></div>
<div class="toast toast-err" id="toastErr"></div>

<script>
const SUPABASE_URL='https://jkdpgdpvsxhysrcoqnxv.supabase.co';
const SUPABASE_KEY='sb_publishable_7H4N30FrzliMlDPuk8ulLA_XVWtdFlm';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS_ES=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const now=new Date();
document.getElementById('todayLabel').textContent=DAYS_ES[now.getDay()]+', '+now.getDate()+' de '+MONTHS[now.getMonth()]+' '+now.getFullYear();

const TIPO_OPTS=['warmup','normal','top','backoff','fallo'];
const TIPO_LABELS={warmup:'Calentamiento',normal:'Serie',top:'Top set',backoff:'Back off',fallo:'Hasta el fallo'};
const TIPO_CLS={warmup:'tipo-warmup',normal:'tipo-normal',top:'tipo-top',backoff:'tipo-backoff',fallo:'tipo-fallo'};

const RUTINA=[
  {id:1,nombre:'Día 1 — Glúteo y Cuádriceps',ejercicios:[
    {id:11,nombre:'Hip thrust en máquina',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:12,nombre:'Aductores',repsRef:'8 mín',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:13,nombre:'Sentadilla Smith',repsRef:'8-10',series:[{tipo:'warmup'},{tipo:'warmup'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:14,nombre:'Abducción inclinación 30°',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:15,nombre:'Extensión de cuádriceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:16,nombre:'Sentadilla búlgara',repsRef:'Fallo',series:[{tipo:'fallo'},{tipo:'fallo'}]},
  ]},
  {id:2,nombre:'Día 2 — Pecho / Hombro / Tríceps',ejercicios:[
    {id:21,nombre:'Press inclinado mancuernas',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:22,nombre:'Peck deck',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:23,nombre:'Press militar',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:24,nombre:'Elevaciones laterales',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:25,nombre:'Extensión de tríceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:26,nombre:'Copa para tríceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:3,nombre:'Día 3 — Cuádriceps e Isquiotibiales',ejercicios:[
    {id:31,nombre:'Curl tumbado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:32,nombre:'Aductores',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:33,nombre:'Prensa',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:34,nombre:'Extensión de cuádriceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:35,nombre:'Curl sentado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:4,nombre:'Día 4 — Espalda / Bíceps',ejercicios:[
    {id:41,nombre:'Jalón al pecho',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:42,nombre:'Remo Gironda',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:43,nombre:'Jalón agarre supino',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:44,nombre:'Remo alto',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:45,nombre:'Curl de bíceps',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
  {id:5,nombre:'Día 5 — Glúteo e Isquiotibiales',ejercicios:[
    {id:51,nombre:'Curl sentado',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:52,nombre:'Hip thrust en máquina',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:53,nombre:'Aductores',repsRef:'8 mín',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:54,nombre:'Abducción inclinación 30°',repsRef:'8-15',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:55,nombre:'Peso muerto rumano',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
    {id:56,nombre:'Curl martillo',repsRef:'8-10',series:[{tipo:'normal'},{tipo:'normal'},{tipo:'normal'}]},
  ]},
];

let sessionLog={};
let calYear=now.getFullYear();
let calMonth=now.getMonth();
let sesionesDelMes=[];
let sesionEditando=null;

// ── POPULATE SELECT ──
function populateSelect(){
  const sel=document.getElementById('routineSelect');
  RUTINA.forEach(r=>{sel.innerHTML+=`<option value="${r.id}">${r.nombre}</option>`;});
  sel.onchange=()=>initLog();
}

// ── LOG DEL DÍA ──
function getLog(exId,si){
  const k=exId+'_'+si;
  if(!sessionLog[k])sessionLog[k]={tipo:null,peso:'',reps:'',comentario:'',drops:[]};
  return sessionLog[k];
}

function initLog(){
  const id=parseInt(document.getElementById('routineSelect').value);
  if(!id){document.getElementById('logContent').innerHTML='<div class="no-content">⬆️ Selecciona el día para comenzar</div>';return;}
  const r=RUTINA.find(x=>x.id===id);
  sessionLog={};
  renderLog(r);
}

function renderLog(r){
  const totalSeries=r.ejercicios.reduce((a,e)=>a+e.series.length,0);
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${r.ejercicios.length}</div><div class="stat-lbl">Ejercicios</div></div>
    <div class="stat-card"><div class="stat-val">${totalSeries}</div><div class="stat-lbl">Series</div></div>
    <div class="stat-card"><div class="stat-val" id="volTotal">0</div><div class="stat-lbl">Volumen kg</div></div>
  </div>`;
  r.ejercicios.forEach(ex=>{
    html+=`<div class="ex-block">
      <div class="ex-title">
        <div class="ex-title-left">▸ ${ex.nombre} <span class="ex-meta">${ex.series.length} series · ${ex.repsRef} reps</span></div>
        <button class="btn add-warmup-btn btn-sm" onclick="addWarmup(${ex.id},'ex_${ex.id}')">+ calentamiento</button>
      </div>
      <table class="series-table">
        <thead><tr>
          <th style="width:30px">#</th>
          <th style="width:138px">Tipo</th>
          <th style="width:70px">Peso kg</th>
          <th style="width:62px">Reps</th>
          <th>Drop sets</th>
          <th style="width:115px">Comentario</th>
        </tr></thead>
        <tbody id="ex_${ex.id}">`;
    ex.series.forEach((s,si)=>{html+=serieRowHTML(ex.id,si,s.tipo,{});});
    html+=`</tbody></table></div>`;
  });
  document.getElementById('logContent').innerHTML=html;
  calcVolume();
}

function serieRowHTML(exId,si,tipoDefault,log){
  const tipo=log.tipo||tipoDefault;
  return `<tr id="row_${exId}_${si}">
    <td style="text-align:center;color:#555;font-size:11px">${si+1}</td>
    <td><select class="tipo-select ${TIPO_CLS[tipo]}" onchange="setTipo(${exId},${si},this)">
      ${TIPO_OPTS.map(t=>`<option value="${t}"${t===tipo?' selected':''}>${TIPO_LABELS[t]}</option>`).join('')}
    </select></td>
    <td><input type="number" placeholder="—" min="0" step="0.5" value="${log.peso||''}" oninput="setField(${exId},${si},'peso',this.value)"></td>
    <td><input type="number" placeholder="—" min="0" value="${log.reps||''}" oninput="setField(${exId},${si},'reps',this.value)"></td>
    <td>
      <div class="drop-zone" id="dzone_${exId}_${si}">
        ${(log.drops||[]).map((d,di)=>dropHTML(exId,si,di,d)).join('')}
      </div>
      <button class="btn add-drop-btn btn-sm" onclick="addDrop(${exId},${si})">+ drop</button>
    </td>
    <td><textarea placeholder="notas..." oninput="setField(${exId},${si},'comentario',this.value)">${log.comentario||''}</textarea></td>
  </tr>`;
}

function addWarmup(exId,tbodyId){
  const tbody=document.getElementById(tbodyId);
  const firstRow=tbody.querySelector('tr');
  // find next si index
  const rows=tbody.querySelectorAll('tr');
  const newSi='w'+Date.now();
  const tr=document.createElement('tr');
  tr.id='row_'+exId+'_'+newSi;
  tr.innerHTML=serieRowHTML(exId,newSi,'warmup',{}).replace(`<tr id="row_${exId}_${newSi}">`,``).replace(/<\/tr>$/,'');
  // insert before first non-warmup row
  let inserted=false;
  for(let row of rows){
    const sel=row.querySelector('.tipo-select');
    if(sel&&sel.value!=='warmup'){tbody.insertBefore(tr,row);inserted=true;break;}
  }
  if(!inserted)tbody.insertBefore(tr,firstRow);
  renumberRows(tbody);
  calcVolume();
}

function renumberRows(tbody){
  tbody.querySelectorAll('tr').forEach((r,i)=>{
    const cell=r.querySelector('td');
    if(cell)cell.textContent=i+1;
  });
}

function dropHTML(exId,si,di,d){
  return `<div class="drop-item" id="drop_${exId}_${si}_${di}">
    <span class="drop-label">Drop ${di+1}</span>
    <input type="number" placeholder="kg" min="0" step="0.5" value="${d.peso||''}" oninput="setDrop(${exId},${si},${di},'peso',this.value)">
    <span class="drop-sep">×</span>
    <input type="number" placeholder="reps" min="0" value="${d.reps||''}" oninput="setDrop(${exId},${si},${di},'reps',this.value)">
    <button class="btn-ghost" onclick="removeDrop(${exId},${si},${di})">✕</button>
  </div>`;
}

function addDrop(exId,si){
  const log=getLog(exId,si);
  const di=log.drops.length;
  log.drops.push({peso:'',reps:''});
  const zone=document.getElementById('dzone_'+exId+'_'+si);
  const el=document.createElement('div');
  el.innerHTML=dropHTML(exId,si,di,{});
  zone.appendChild(el.firstElementChild);
}

function removeDrop(exId,si,di){
  const log=getLog(exId,si);
  log.drops.splice(di,1);
  document.getElementById('dzone_'+exId+'_'+si).innerHTML=log.drops.map((d,i)=>dropHTML(exId,si,i,d)).join('');
  calcVolume();
}

function setField(exId,si,field,val){getLog(exId,si)[field]=val;calcVolume();}
function setDrop(exId,si,di,field,val){const l=getLog(exId,si);if(!l.drops[di])l.drops[di]={};l.drops[di][field]=val;calcVolume();}
function setTipo(exId,si,sel){getLog(exId,si).tipo=sel.value;sel.className='tipo-select '+TIPO_CLS[sel.value];}

function calcVolume(){
  let vol=0;
  Object.values(sessionLog).forEach(s=>{
    if(s.peso&&s.reps)vol+=parseFloat(s.peso)*parseInt(s.reps);
    (s.drops||[]).forEach(d=>{if(d.peso&&d.reps)vol+=parseFloat(d.peso)*parseInt(d.reps);});
  });
  const el=document.getElementById('volTotal');
  if(el)el.textContent=Math.round(vol);
}

// ── GUARDAR SESIÓN ──
async function guardarSesion(){
  const diaId=parseInt(document.getElementById('routineSelect').value);
  if(!diaId){showToast('Selecciona un día primero','err');return;}
  const r=RUTINA.find(x=>x.id===diaId);
  const fecha=now.toISOString().slice(0,10);

  // recoger series desde el DOM
  const series=[];
  r.ejercicios.forEach(ex=>{
    const tbody=document.getElementById('ex_'+ex.id);
    if(!tbody)return;
    const rows=tbody.querySelectorAll('tr');
    rows.forEach((row,si)=>{
      const sel=row.querySelector('.tipo-select');
      const inputs=row.querySelectorAll('input[type=number]');
      const ta=row.querySelector('textarea');
      const tipo=sel?sel.value:'normal';
      const peso=inputs[0]?parseFloat(inputs[0].value)||null:null;
      const reps=inputs[1]?parseInt(inputs[1].value)||null:null;
      const comentario=ta?ta.value:'';
      const drops=[];
      const zone=row.querySelector('.drop-zone');
      if(zone){
        zone.querySelectorAll('.drop-item').forEach((d,di)=>{
          const dins=d.querySelectorAll('input[type=number]');
          drops.push({drop_index:di,peso:parseFloat(dins[0]?.value)||null,reps:parseInt(dins[1]?.value)||null});
        });
      }
      series.push({ejercicio_id:ex.id,ejercicio_nombre:ex.nombre,serie_index:si,tipo,peso,reps,comentario,es_calentamiento:tipo==='warmup',drops});
    });
  });

  try{
    // insertar sesión
    const{data:sesData,error:sesErr}=await sb.from('sesiones').insert({fecha,dia_id:diaId,dia_nombre:r.nombre}).select().single();
    if(sesErr)throw sesErr;
    const sesId=sesData.id;

    // insertar series
    for(const s of series){
      const{data:sData,error:sErr}=await sb.from('series_log').insert({
        sesion_id:sesId,ejercicio_id:s.ejercicio_id,ejercicio_nombre:s.ejercicio_nombre,
        serie_index:s.serie_index,tipo:s.tipo,peso:s.peso,reps:s.reps,
        comentario:s.comentario,es_calentamiento:s.es_calentamiento
      }).select().single();
      if(sErr)throw sErr;
      if(s.drops.length){
        await sb.from('drop_sets').insert(s.drops.map(d=>({...d,serie_id:sData.id})));
      }
    }
    showToast('✓ Sesión guardada correctamente','ok');
    sesionesDelMes=[];
    renderCalendar();
  }catch(e){
    console.error(e);
    showToast('Error al guardar: '+e.message,'err');
  }
}

// ── HISTORIAL / CALENDARIO ──
async function cargarSesionesDelMes(){
  const y=calYear,m=calMonth;
  const desde=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const hasta=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const{data,error}=await sb.from('sesiones').select('id,fecha,dia_nombre').gte('fecha',desde).lte('fecha',hasta).order('fecha');
  if(!error)sesionesDelMes=data||[];
}

async function renderCalendar(){
  document.getElementById('calTitle').textContent=MONTHS[calMonth].charAt(0).toUpperCase()+MONTHS[calMonth].slice(1)+' '+calYear;
  await cargarSesionesDelMes();
  const grid=document.getElementById('calGrid');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  const sesMap={};
  sesionesDelMes.forEach(s=>{if(!sesMap[s.fecha])sesMap[s.fecha]=[];sesMap[s.fecha].push(s);});
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasSes=sesMap[dateStr]&&sesMap[dateStr].length>0;
    const isToday=dateStr===todayStr;
    let cls='cal-day';
    if(hasSes)cls+=' has-session';
    if(isToday)cls+=' today';
    const dot=hasSes?`<div class="cal-dot"></div>`:'';
    html+=`<div class="${cls}" onclick="selectDay('${dateStr}')">${d}${dot}</div>`;
  }
  grid.innerHTML=html;
}

async function selectDay(dateStr){
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.remove('selected'));
  const days=document.querySelectorAll('.cal-day:not(.empty)');
  const day=parseInt(dateStr.split('-')[2]);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const el=document.querySelectorAll('.cal-grid .cal-day:not(.empty)')[day-1];
  if(el)el.classList.add('selected');

  const{data,error}=await sb.from('sesiones').select('*').eq('fecha',dateStr).order('creado_at');
  const detail=document.getElementById('sessionDetail');
  if(error||!data||!data.length){
    detail.innerHTML=`<div class="no-content" style="padding:1rem">Sin sesiones el ${dateStr}</div>`;return;
  }
  let html=`<div style="font-size:13px;font-weight:500;color:#888;margin-bottom:8px;padding:0 4px">${dateStr}</div><div class="session-list">`;
  data.forEach(s=>{
    html+=`<div class="session-item">
      <div class="session-info">
        <div class="session-date">${s.dia_nombre}</div>
        <div class="session-sub">Guardado el ${new Date(s.creado_at).toLocaleString('es')}</div>
      </div>
      <div class="session-actions">
        <button class="btn btn-sm" onclick="verSesion('${s.id}')">👁 Ver</button>
        <button class="btn btn-sm btn-red" onclick="eliminarSesion('${s.id}','${dateStr}')">🗑 Eliminar</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  detail.innerHTML=html;
}

async function verSesion(sesId){
  const{data:series}=await sb.from('series_log').select('*,drop_sets(*)').eq('sesion_id',sesId).order('ejercicio_id').order('serie_index');
  if(!series||!series.length){showToast('Sin datos en esta sesión','err');return;}

  const grupos={};
  series.forEach(s=>{
    if(!grupos[s.ejercicio_nombre])grupos[s.ejercicio_nombre]=[];
    grupos[s.ejercicio_nombre].push(s);
  });

  let html='';
  Object.entries(grupos).forEach(([nombre,srs])=>{
    html+=`<div class="ex-block" style="margin-bottom:10px">
      <div class="ex-title"><div class="ex-title-left">▸ ${nombre}</div></div>
      <table class="series-table"><thead><tr>
        <th style="width:30px">#</th><th style="width:120px">Tipo</th>
        <th style="width:70px">Peso kg</th><th style="width:62px">Reps</th>
        <th>Drops</th><th>Comentario</th>
      </tr></thead><tbody>`;
    srs.forEach((s,i)=>{
      const drops=s.drop_sets||[];
      const dropStr=drops.map((d,di)=>`<span style="font-size:10px;color:#d45c8a;background:#2b0d1a;padding:2px 6px;border-radius:4px;margin-right:4px">Drop ${di+1}: ${d.peso||'—'}kg × ${d.reps||'—'}</span>`).join('');
      html+=`<tr>
        <td style="text-align:center;color:#555;font-size:11px">${i+1}</td>
        <td><span class="tipo-select ${TIPO_CLS[s.tipo]||'tipo-normal'}" style="cursor:default">${TIPO_LABELS[s.tipo]||s.tipo}</span></td>
        <td style="text-align:center">${s.peso||'—'}</td>
        <td style="text-align:center">${s.reps||'—'}</td>
        <td>${dropStr||'—'}</td>
        <td style="color:#666;font-size:11px">${s.comentario||''}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('editModalContent').innerHTML=html;
  document.getElementById('editModal').classList.add('open');
  sesionEditando=sesId;
}

async function eliminarSesion(sesId,dateStr){
  if(!confirm('¿Eliminar esta sesión? Esta acción no se puede deshacer.'))return;
  const{error}=await sb.from('sesiones').delete().eq('id',sesId);
  if(error){showToast('Error al eliminar','err');return;}
  showToast('Sesión eliminada','ok');
  sesionesDelMes=[];
  renderCalendar();
  selectDay(dateStr);
}

function cerrarModal(){
  document.getElementById('editModal').classList.remove('open');
  sesionEditando=null;
}

async function guardarEdicion(){
  cerrarModal();
  showToast('Sesión actualizada','ok');
}

function cambiarMes(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  sesionesDelMes=[];
  renderCalendar();
  document.getElementById('sessionDetail').innerHTML=`<div class="no-content" style="padding:1rem">Selecciona un día del calendario</div>`;
}

// ── PLAN ──
function renderPlan(){
  let html='';
  RUTINA.forEach(r=>{
    html+=`<div style="border:1px solid #2a2a2a;border-radius:12px;margin-bottom:12px;overflow:hidden">
      <div style="padding:10px 14px;background:#222;font-size:13px;font-weight:500;color:#e8e8e8;border-bottom:1px solid #2a2a2a">
        📅 ${r.nombre} <span style="font-size:11px;font-weight:400;color:#666">${r.ejercicios.length} ejercicios</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="padding:6px 14px;text-align:left;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222">Ejercicio</th>
          <th style="padding:6px 14px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:60px">Series</th>
          <th style="padding:6px 14px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:80px">Reps</th>
        </tr></thead><tbody>`;
    r.ejercicios.forEach((ex,i)=>{
      html+=`<tr style="${i<r.ejercicios.length-1?'border-bottom:1px solid #1e1e1e':''}">
        <td style="padding:8px 14px;color:#ccc">${ex.nombre}</td>
        <td style="padding:8px 14px;text-align:center;color:#666">${ex.series.length}</td>
        <td style="padding:8px 14px;text-align:center;color:#666">${ex.repsRef}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('planContent').innerHTML=html;
}

// ── UTILS ──
function showToast(msg,type){
  const el=document.getElementById(type==='ok'?'toastOk':'toastErr');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},2500);
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='historial')renderCalendar();
  if(t==='plan')renderPlan();
}

document.getElementById('editModal').onclick=function(e){if(e.target===this)cerrarModal();};

populateSelect();
</script>
