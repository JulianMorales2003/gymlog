<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GymLog</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1.5rem}
.login-logo{font-size:28px;font-weight:700;color:#fff;margin-bottom:.5rem}
.login-sub{font-size:13px;color:#666;margin-top:-1rem}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:360px}
.profile-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s}
.profile-card:hover{border-color:#1D9E75;background:#1e2e28}
.profile-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid #333}
.profile-name{font-size:14px;font-weight:600;color:#e8e8e8}
.profile-days{font-size:11px;color:#666}
.avatar-julian{background:#0d2b1a;border-color:#1a4a28}
.avatar-angela{background:#2b0d1a;border-color:#4a1530}

/* APP */
.app-screen{display:none}
.app-screen.active{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.user-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.badge-julian{background:#0d2b1a;color:#4cba7a;border:1px solid #1a4a28}
.badge-angela{background:#2b0d1a;color:#d45c8a;border:1px solid #4a1530}
.logout-btn{font-size:11px;padding:4px 10px;border:1px solid #333;border-radius:8px;background:none;color:#666;cursor:pointer}
.logout-btn:hover{color:#e8e8e8;border-color:#555}
.date-label{font-size:12px;color:#888;margin-top:2px}
.tab-bar{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;margin-bottom:1rem}
select{font-size:13px;padding:8px 10px;border:1px solid #333;border-radius:8px;background:#222;color:#e8e8e8;width:100%}
select:focus{outline:none;border-color:#1D9E75}
.btn{padding:7px 14px;font-size:12px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e8e8e8;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#2a2a2a}
.btn-green{background:#1D9E75;color:#fff;border-color:#0F6E56}.btn-green:hover{background:#0F6E56}
.btn-red{background:#3d1a1a;color:#f08080;border-color:#5a2a2a}.btn-red:hover{background:#4d2020}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{border:none;background:none;color:#555;padding:2px 6px;cursor:pointer;font-size:13px}.btn-ghost:hover{color:#E24B4A}
.no-content{text-align:center;padding:2.5rem 1rem;color:#555;font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 8px;text-align:center}
.stat-val{font-size:22px;font-weight:600;color:#fff}
.stat-lbl{font-size:10px;color:#666;margin-top:2px}
.ex-block{border:1px solid #2a2a2a;border-radius:12px;margin-bottom:8px;overflow:hidden;background:#1a1a1a}
.ex-header{padding:11px 12px;background:#222;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px}
.ex-header:hover{background:#282828}
.ex-header:active{background:#2e2e2e}
.ex-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ex-nombre{font-size:13px;font-weight:500;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:11px;color:#666;white-space:nowrap;flex-shrink:0}
.ex-body{display:none;border-top:1px solid #2a2a2a}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.series-table{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
.series-table th{padding:6px 8px;text-align:left;font-size:11px;color:#666;font-weight:500;background:#1e1e1e;border-bottom:1px solid #2a2a2a}
.series-table td{padding:6px 8px;border-bottom:1px solid #1e1e1e;vertical-align:middle;color:#e8e8e8}
.series-table tr:last-child td{border-bottom:none}
.series-table input[type=number]{width:56px;padding:5px 4px;font-size:12px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;text-align:center;-moz-appearance:textfield}
.series-table input[type=number]::-webkit-inner-spin-button{opacity:0}
.series-table input[type=number]:focus{outline:none;border-color:#1D9E75}
.series-table textarea{width:100%;padding:4px 6px;font-size:11px;border:1px solid #333;border-radius:6px;background:#111;color:#e8e8e8;resize:none;height:32px}
.series-table textarea:focus{outline:none;border-color:#1D9E75}
.tipo-select{font-size:11px;padding:3px 6px;border-radius:20px;cursor:pointer;font-weight:500;border:1px solid;width:auto}
.tipo-warmup{background:#0c2a3d;color:#5bb3e8;border-color:#1a4a6a}
.tipo-top{background:#0d2b1a;color:#4cba7a;border-color:#1a4a28}
.tipo-backoff{background:#2b1f08;color:#d4943a;border-color:#4a3010}
.tipo-normal{background:#222;color:#aaa;border-color:#333}
.tipo-fallo{background:#2b0d1a;color:#d45c8a;border-color:#4a1530}
.drop-zone{padding:3px 0 2px}
.drop-item{display:flex;align-items:center;gap:5px;margin-bottom:4px;padding:4px 7px;background:#111;border-radius:6px;border:1px solid #2a2a2a}
.drop-label{font-size:10px;font-weight:600;color:#d45c8a;white-space:nowrap;min-width:40px}
.drop-sep{font-size:11px;color:#555}
.drop-item input[type=number]{width:48px;font-size:11px;padding:3px 4px;border:1px solid #333;border-radius:5px;background:#1a1a1a;color:#e8e8e8;text-align:center}
.add-drop-btn{font-size:10px;padding:2px 7px;color:#d45c8a;border-color:#4a1530;background:#2b0d1a;margin-top:2px}
.add-warmup-btn{font-size:10px;padding:2px 7px;color:#5bb3e8;border-color:#1a4a6a;background:#0c2a3d}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-day-name{text-align:center;font-size:10px;color:#666;padding:3px 0;font-weight:500}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid transparent;color:#888;background:#1a1a1a;flex-direction:column;gap:1px}
.cal-day:hover{border-color:#333;color:#e8e8e8}
.cal-day.has-session{background:#0d2b1a;border-color:#1a4a28;color:#4cba7a}
.cal-day.today{border-color:#1D9E75;color:#1D9E75;font-weight:600}
.cal-day.selected{background:#1D9E75;color:#fff;border-color:#1D9E75}
.cal-day.empty{cursor:default;background:transparent;border:none}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#4cba7a}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav-title{font-size:14px;font-weight:500;color:#e8e8e8}
.session-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.session-actions{display:flex;gap:6px;flex-shrink:0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:14px;width:100%;max-width:640px;margin:auto;display:flex;flex-direction:column;max-height:88vh}
.modal-header{padding:.9rem 1.1rem;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:14px;font-weight:500;color:#e8e8e8}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1.1rem;flex:1}
.modal-footer{padding:.7rem 1.1rem;border-top:1px solid #2a2a2a;display:flex;justify-content:flex-end;flex-shrink:0}
.modal-ex{border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.modal-ex-header{padding:9px 12px;background:#222;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.modal-ex-header:hover{background:#282828}
.modal-ex-body{display:none;overflow-x:auto}
.modal-ex-body.open{display:block}
.saving-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;font-size:14px;color:#fff;gap:10px}
.saving-overlay.show{display:flex}
.spinner{width:18px;height:18px;border:2px solid #333;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:500;display:none;z-index:999;white-space:nowrap}
.toast-ok{background:#1D9E75;color:#fff}
.toast-err{background:#8b2020;color:#fff}
@media(max-width:480px){
  .profile-grid{grid-template-columns:1fr 1fr;gap:12px}
  .profile-avatar{width:54px;height:54px;font-size:24px}
  .series-table{min-width:400px}
  .top-bar{gap:6px}
  .stats-row{gap:6px}
  .stat-val{font-size:18px}
}
</style>
</head>

<!-- APP -->

    <button class="tab" onclick="switchTab('plan',this)">📋 Plan</button>

      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="sessionDetail"><div class="no-content" style="padding:1rem">Selecciona un día del calendario</div></div>
  </div>
  <div id="sec-plan" class="section"><div id="planContent"></div></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="viewModal">

let currentUser=null;
let calYear=now.getFullYear(),calMonth=now.getMonth(),sesionesDelMes=[];

// ── LOGIN ──
function login(user){
  currentUser=user;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('active');
  const badge=document.getElementById('userBadge');
  badge.textContent=user==='julian'?'💪 Julian':'🌸 Angela';
  badge.className='user-badge '+(user==='julian'?'badge-julian':'badge-angela');
  document.getElementById('todayLabel').textContent=DAYS_ES[now.getDay()]+', '+now.getDate()+' de '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  populateSelect();
  switchTab('log',document.querySelector('.tab'));
}

function logout(){
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('logContent').innerHTML='<div class="no-content">⬆️ Selecciona el día para comenzar</div>';
  sesionesDelMes=[];
}

function populateSelect(){
  const sel=document.getElementById('routineSelect');
  const rutinas=RUTINAS[currentUser]||[];
  sel.innerHTML='<option value="">— Selecciona el día —</option>';
  rutinas.forEach(r=>{sel.innerHTML+=`<option value="${r.id}">${r.nombre}</option>`;});
  sel.onchange=()=>initLog();
}

// ── LOG ──
function initLog(){
  const id=parseInt(document.getElementById('routineSelect').value);
  if(!id){document.getElementById('logContent').innerHTML='<div class="no-content">⬆️ Selecciona el día para comenzar</div>';return;}
  const rutinas=RUTINAS[currentUser]||[];
  renderLog(rutinas.find(x=>x.id===id));
}

function renderLog(r){
  const totalSeries=r.ejercicios.reduce((a,e)=>a+e.series.length,0);
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${r.ejercicios.length}</div><div class="stat-lbl">Ejercicios</div></div>
    <div class="stat-card"><div class="stat-val">${totalSeries}</div><div class="stat-lbl">Series</div></div>
    <div class="stat-card"><div class="stat-val" id="volTotal">0</div><div class="stat-lbl">Volumen kg</div></div>
  </div>`;
  r.ejercicios.forEach((ex,ei)=>{
    const isOpen=ei===0;
    html+=`<div class="ex-block" id="block_${ex.id}">
      <div class="ex-header" onclick="toggleEx(${ex.id})">
        <div class="ex-header-left">
          <span id="chev_${ex.id}" style="font-size:11px;color:#666;display:inline-block;transition:transform .2s;${isOpen?'transform:rotate(90deg)':''}">▶</span>
          <span class="ex-nombre">${ex.nombre}</span>
          <span class="ex-meta">${ex.series.length}s · ${ex.repsRef}</span>
        </div>
        <button class="btn add-warmup-btn btn-sm" onclick="event.stopPropagation();addWarmup(${ex.id})">+ cal</button>
      </div>
      <div id="body_${ex.id}" class="ex-body" style="display:${isOpen?'block':'none'}">
        <div class="table-wrap"><table class="series-table">
          <thead><tr>
            <th style="width:24px">#</th>
            <th style="width:120px">Tipo</th>
            <th style="width:60px">Peso</th>
            <th style="width:54px">Reps</th>
            <th>Drops</th>
            <th style="width:100px">Nota</th>
            <th style="width:24px"></th>
          </tr></thead>
          <tbody id="ex_${ex.id}">`;
    ex.series.forEach((s,si)=>{html+=serieRowHTML(ex.id,si,s.tipo);});
    html+=`</tbody></table></div></div></div>`;
  });
  document.getElementById('logContent').innerHTML=html;
}

function toggleEx(exId){
  const body=document.getElementById('body_'+exId);
  const chev=document.getElementById('chev_'+exId);
  const isOpen=body.style.display==='block';
  body.style.display=isOpen?'none':'block';
  chev.style.transform=isOpen?'rotate(0deg)':'rotate(90deg)';
}

function serieRowHTML(exId,si,tipo){
  return `<tr id="row_${exId}_${si}">
    <td style="text-align:center;color:#555;font-size:11px">${si+1}</td>
    <td><select class="tipo-select ${TIPO_CLS[tipo]}" onchange="this.className='tipo-select '+tipoClsMap[this.value];calcVolume()">
      ${TIPO_OPTS.map(t=>`<option value="${t}"${t===tipo?' selected':''}>${TIPO_LABELS[t]}</option>`).join('')}
    </select></td>
    <td><input type="number" placeholder="—" min="0" step="0.5" oninput="calcVolume()"></td>
    <td><input type="number" placeholder="—" min="0" oninput="calcVolume()"></td>
    <td>
      <div class="drop-zone" id="dzone_${exId}_${si}"></div>
      <button class="btn add-drop-btn btn-sm" onclick="addDrop('${exId}','${si}')">+ drop</button>
    </td>
    <td><textarea placeholder="notas..."></textarea></td>
    <td><button class="btn-ghost" style="font-size:13px" onclick="eliminarFila(this)" title="Eliminar">✕</button></td>
  </tr>`;
}

function eliminarFila(btn){
  const row=btn.closest('tr');
  const tbody=row.closest('tbody');
  row.remove();
  renumberRows(tbody);
  calcVolume();
}

function addWarmup(exId){
  const tbody=document.getElementById('ex_'+exId);
  document.getElementById('body_'+exId).style.display='block';
  document.getElementById('chev_'+exId).style.transform='rotate(90deg)';
  const rows=[...tbody.querySelectorAll('tr')];
  const newSi='w'+Date.now();
  const tr=document.createElement('tr');
  tr.id='row_'+exId+'_'+newSi;
  tr.innerHTML=serieRowHTML(exId,newSi,'warmup').replace(`<tr id="row_${exId}_${newSi}">`,``);
  let inserted=false;
  for(let row of rows){
    const sel=row.querySelector('.tipo-select');
    if(sel&&sel.value!=='warmup'){tbody.insertBefore(tr,row);inserted=true;break;}
  }
  if(!inserted)tbody.insertBefore(tr,rows[0]||null);
  renumberRows(tbody);
}

function renumberRows(tbody){
  [...tbody.querySelectorAll('tr')].forEach((r,i)=>{
    const cell=r.querySelector('td');
    if(cell)cell.textContent=i+1;
  });
}

function dropHTML(exId,si,di){
  return `<div class="drop-item" id="drop_${exId}_${si}_${di}">
    <span class="drop-label">Drop ${di+1}</span>
    <input type="number" placeholder="kg" min="0" step="0.5" oninput="calcVolume()">
    <span class="drop-sep">×</span>
    <input type="number" placeholder="reps" min="0" oninput="calcVolume()">
    <button class="btn-ghost" onclick="this.closest('.drop-item').remove();renumDrops('${exId}','${si}')">✕</button>
  </div>`;
}

function addDrop(exId,si){
  const zone=document.getElementById('dzone_'+exId+'_'+si);
  const di=zone.querySelectorAll('.drop-item').length;
  const el=document.createElement('div');
  el.innerHTML=dropHTML(exId,si,di);
  zone.appendChild(el.firstElementChild);
}

function renumDrops(exId,si){
  const zone=document.getElementById('dzone_'+exId+'_'+si);
  if(zone)zone.querySelectorAll('.drop-label').forEach((l,i)=>l.textContent='Drop '+(i+1));
  calcVolume();
}

function calcVolume(){
  let vol=0;
  document.querySelectorAll('#logContent tbody tr').forEach(row=>{
    const ins=row.querySelectorAll('td > input[type=number]');
    const p=parseFloat(ins[0]?.value)||0,r=parseInt(ins[1]?.value)||0;
    if(p&&r)vol+=p*r;
    row.querySelectorAll('.drop-item').forEach(d=>{
      const di=d.querySelectorAll('input[type=number]');
      if(parseFloat(di[0]?.value)&&parseInt(di[1]?.value))vol+=parseFloat(di[0].value)*parseInt(di[1].value);
    });
  });
  const el=document.getElementById('volTotal');
  if(el)el.textContent=Math.round(vol);
}

async function guardarSesion(){
  const diaId=parseInt(document.getElementById('routineSelect').value);
  if(!diaId){showToast('Selecciona un día primero','err');return;}
  const rutinas=RUTINAS[currentUser]||[];
  const r=rutinas.find(x=>x.id===diaId);
  const fecha=now.toISOString().slice(0,10);
  const series=[];
  r.ejercicios.forEach(ex=>{
    const tbody=document.getElementById('ex_'+ex.id);
    if(!tbody)return;
    [...tbody.querySelectorAll('tr')].forEach((row,si)=>{
      const sel=row.querySelector('.tipo-select');
      const ins=row.querySelectorAll('td > input[type=number]');
      const ta=row.querySelector('textarea');
      const tipo=sel?sel.value:'normal';
      const peso=parseFloat(ins[0]?.value)||null;
      const reps=parseInt(ins[1]?.value)||null;
      const comentario=ta?ta.value.trim():'';
      const drops=[];
      row.querySelectorAll('.drop-item').forEach((d,di)=>{
        const dins=d.querySelectorAll('input[type=number]');
        drops.push({drop_index:di,peso:parseFloat(dins[0]?.value)||null,reps:parseInt(dins[1]?.value)||null});
      });
      series.push({ejercicio_id:ex.id,ejercicio_nombre:ex.nombre,serie_index:si,tipo,peso,reps,comentario,es_calentamiento:tipo==='warmup',drops});
    });
  });
  document.getElementById('savingOverlay').classList.add('show');
  try{
    const{data:sesData,error:sesErr}=await sb.from('sesiones').insert({fecha,dia_id:diaId,dia_nombre:r.nombre,usuario:currentUser}).select().single();
    if(sesErr)throw sesErr;
    const sesId=sesData.id;
    for(const s of series){
      const{data:sData,error:sErr}=await sb.from('series_log').insert({
        sesion_id:sesId,ejercicio_id:s.ejercicio_id,ejercicio_nombre:s.ejercicio_nombre,
        serie_index:s.serie_index,tipo:s.tipo,peso:s.peso,reps:s.reps,
        comentario:s.comentario,es_calentamiento:s.es_calentamiento
      }).select().single();
      if(sErr)throw sErr;
      if(s.drops.length)await sb.from('drop_sets').insert(s.drops.map(d=>({...d,serie_id:sData.id})));
    }
    document.getElementById('routineSelect').value='';
    document.getElementById('logContent').innerHTML='<div class="no-content">✅ Sesión guardada. ¡Buen trabajo!</div>';
    sesionesDelMes=[];
    showToast('✓ Sesión guardada','ok');
  }catch(e){
    console.error(e);
    showToast('Error: '+e.message,'err');
  }finally{
    document.getElementById('savingOverlay').classList.remove('show');
  }
}

// ── HISTORIAL ──
async function cargarSesionesDelMes(){
  const y=calYear,m=calMonth;
  const desde=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const hasta=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const{data,error}=await sb.from('sesiones').select('id,fecha,dia_nombre').eq('usuario',currentUser).gte('fecha',desde).lte('fecha',hasta).order('fecha');
  if(!error)sesionesDelMes=data||[];
}

async function renderCalendar(){
  document.getElementById('calTitle').textContent=MONTHS[calMonth].charAt(0).toUpperCase()+MONTHS[calMonth].slice(1)+' '+calYear;
  await cargarSesionesDelMes();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  const sesMap={};
  sesionesDelMes.forEach(s=>{if(!sesMap[s.fecha])sesMap[s.fecha]=[];sesMap[s.fecha].push(s);});
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='cal-day'+(sesMap[ds]?' has-session':'')+(ds===todayStr?' today':'');
    html+=`<div class="${cls}" onclick="selectDay('${ds}')">${d}${sesMap[ds]?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

async function selectDay(dateStr){
  document.querySelectorAll('.cal-day:not(.empty)').forEach(d=>d.classList.remove('selected'));
  const day=parseInt(dateStr.split('-')[2]);
  const el=document.querySelectorAll('.cal-grid .cal-day:not(.empty)')[day-1];
  if(el)el.classList.add('selected');
  const{data,error}=await sb.from('sesiones').select('*').eq('usuario',currentUser).eq('fecha',dateStr).order('creado_at');
  const detail=document.getElementById('sessionDetail');
  if(error||!data||!data.length){detail.innerHTML=`<div class="no-content" style="padding:1rem">Sin sesiones el ${dateStr}</div>`;return;}
  let html=`<div style="font-size:12px;color:#888;margin-bottom:8px">${dateStr}</div>`;
  data.forEach(s=>{
    html+=`<div class="session-item">
      <div>
        <div style="font-size:13px;font-weight:500;color:#e8e8e8">${s.dia_nombre}</div>
        <div style="font-size:11px;color:#666;margin-top:2px">${new Date(s.creado_at).toLocaleString('es')}</div>
      </div>
      <div class="session-actions">
        <button class="btn btn-sm" onclick="verSesion('${s.id}','${s.dia_nombre}')">👁 Ver</button>
        <button class="btn btn-sm btn-red" onclick="eliminarSesion('${s.id}','${dateStr}')">🗑</button>
      </div>
    </div>`;
  });
  detail.innerHTML=html;
}

async function verSesion(sesId,titulo){
  const{data:series}=await sb.from('series_log').select('*,drop_sets(*)').eq('sesion_id',sesId).order('ejercicio_id').order('serie_index');
  if(!series||!series.length){showToast('Sin datos','err');return;}
  const grupos={};
  series.forEach(s=>{if(!grupos[s.ejercicio_nombre])grupos[s.ejercicio_nombre]=[];grupos[s.ejercicio_nombre].push(s);});
  document.getElementById('modalTitle').textContent='👁 '+titulo;
  let html='';
  Object.entries(grupos).forEach(([nombre,srs],gi)=>{
    const isOpen=gi===0;
    html+=`<div class="modal-ex">
      <div class="modal-ex-header" onclick="toggleModalEx(this)">
        <span style="font-size:11px;color:#666;transition:transform .2s;display:inline-block;${isOpen?'transform:rotate(90deg)':''}">▶</span>
        <span style="font-size:13px;font-weight:500;color:#e8e8e8;flex:1">${nombre}</span>
        <span style="font-size:11px;color:#666">${srs.length} series</span>
      </div>
      <div class="modal-ex-body${isOpen?' open':''}">
        <table class="series-table"><thead><tr>
          <th style="width:24px">#</th><th style="width:110px">Tipo</th>
          <th style="width:60px">Peso</th><th style="width:54px">Reps</th>
          <th>Drops</th><th>Nota</th>
        </tr></thead><tbody>`;
    srs.forEach((s,i)=>{
      const drops=(s.drop_sets||[]).map((d,di)=>`<span style="font-size:10px;color:#d45c8a;background:#2b0d1a;padding:2px 5px;border-radius:4px;margin-right:2px;white-space:nowrap;display:inline-block;margin-bottom:2px">D${di+1}:${d.peso||'—'}×${d.reps||'—'}</span>`).join('');
      html+=`<tr>
        <td style="text-align:center;color:#555;font-size:11px">${i+1}</td>
        <td><span class="tipo-select ${TIPO_CLS[s.tipo]||'tipo-normal'}" style="cursor:default;display:inline-block">${TIPO_LABELS[s.tipo]||s.tipo}</span></td>
        <td style="text-align:center">${s.peso||'—'}</td>
        <td style="text-align:center">${s.reps||'—'}</td>
        <td>${drops||'—'}</td>
        <td style="color:#666;font-size:11px">${s.comentario||''}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('viewModal').classList.add('open');
}

function toggleModalEx(header){
  const chev=header.querySelector('span');
  const body=header.nextElementSibling;
  const isOpen=body.classList.toggle('open');
  chev.style.transform=isOpen?'rotate(90deg)':'rotate(0deg)';
}

async function eliminarSesion(sesId,dateStr){
  if(!confirm('¿Eliminar esta sesión?'))return;
  const{error}=await sb.from('sesiones').delete().eq('id',sesId);
  if(error){showToast('Error al eliminar','err');return;}
  showToast('Sesión eliminada','ok');
  sesionesDelMes=[];
  await renderCalendar();
  selectDay(dateStr);
}

function cerrarModal(){document.getElementById('viewModal').classList.remove('open');}
document.getElementById('viewModal').onclick=function(e){if(e.target===this)cerrarModal();};

function cambiarMes(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  sesionesDelMes=[];renderCalendar();
  document.getElementById('sessionDetail').innerHTML=`<div class="no-content" style="padding:1rem">Selecciona un día del calendario</div>`;
}

function renderPlan(){
  const rutinas=RUTINAS[currentUser]||[];
  let html='';
  rutinas.forEach(r=>{
    html+=`<div style="border:1px solid #2a2a2a;border-radius:12px;margin-bottom:10px;overflow:hidden">
      <div style="padding:10px 14px;background:#222;font-size:13px;font-weight:500;color:#e8e8e8;border-bottom:1px solid #2a2a2a">
        📅 ${r.nombre} <span style="font-size:11px;font-weight:400;color:#666">${r.ejercicios.length} ejercicios</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="padding:6px 12px;text-align:left;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222">Ejercicio</th>
          <th style="padding:6px 12px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:55px">Series</th>
          <th style="padding:6px 12px;text-align:center;font-size:11px;color:#666;background:#1a1a1a;border-bottom:1px solid #222;width:70px">Reps</th>
        </tr></thead><tbody>`;
    r.ejercicios.forEach((ex,i)=>{
      html+=`<tr style="${i<r.ejercicios.length-1?'border-bottom:1px solid #1e1e1e':''}">
        <td style="padding:7px 12px;color:#ccc">${ex.nombre}</td>
        <td style="padding:7px 12px;text-align:center;color:#666">${ex.series.length}</td>
        <td style="padding:7px 12px;text-align:center;color:#666">${ex.repsRef}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('planContent').innerHTML=html;
}

function showToast(msg,type){
  const el=document.getElementById(type==='ok'?'toastOk':'toastErr');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},2500);
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='historial')renderCalendar();
  if(t==='plan')renderPlan();
}
</script>
